services:
  postgres:
    image: postgres:15-alpine
    container_name: angotest_dj_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - web_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"] 
      interval: 10s
      timeout: 5s
      retries: 5     

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: angotest_dj_backend
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: production
      DB_HOST: angotest_dj_postgres # Sobreescribe a .env

    networks:
      - web_network
    expose:
      - '8000'
    env_file:
      - .env      

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: angotest_dj_frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80"  # Solo interno, no expuesto al host
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - web_network  # Cambiado: usa la red compartida
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  static_volume:
  media_volume:
  postgres_data:

# Usa la red externa compartida
networks:
  web_network:
    external: true  # La red debe existir previamente
